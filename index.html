<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NewsBucket</title>
<link rel="stylesheet" href="style.css" />
</head>
<body data-theme="light">
<div class="app-shell">
  <header class="topbar">
    <div class="brand">News<span>Bucket</span></div>
    <div class="theme-toggle">
      <button data-theme-btn="light" class="active">Light</button>
      <button data-theme-btn="dark">Dark</button>
      <button data-theme-btn="amoled">AMOLED</button>
    </div>
  </header>
  <div class="search-row">
    <input id="searchInput" placeholder="Search news, teams, players, topics…" />
  </div>
  <div class="ticker-wrap">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
  <nav class="tabs">
    <button data-tab="home" class="active">For You</button>
    <button data-tab="breaking">🔴 Breaking</button>
    <button data-tab="trending">🔥 Trending</button>
    <button data-tab="football">⚽ Football</button>
    <button data-tab="cricket">🏏 Cricket</button>
    <button data-tab="world">🌍 World</button>
    <button data-tab="technology">💻 Technology</button>
    <button data-tab="business">💰 Business</button>
    <button data-tab="crypto">₿ Crypto</button>
    <button data-tab="entertainment">🎬 Entertainment</button>
    <button data-tab="live">🌐 Live Headlines</button>
    <button data-tab="bookmarks">🔖 Saved</button>
  </nav>
  <main id="main"></main>
  <footer class="note">NewsBucket static demo — all data is local to this page, nothing is sent to a server.</footer>
</div>

<button class="chat-fab" id="chatFab" style="display:none;">💬 Chat with News</button>
<div class="chat-sheet" id="chatSheet">
  <div class="chat-panel">
    <div class="chat-header">
      <strong>Chat with News</strong>
      <button id="closeChat" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-secondary);">✕</button>
    </div>
    <div class="chat-log" id="chatLog"></div>
    <div class="chat-input-row">
      <input id="chatInput" placeholder="Ask a question about this article…" />
      <button id="sendChat">Ask</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>


<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
